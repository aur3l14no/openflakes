name: Build and cache
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Daily sing-box version check (cheap: no-op unless upstream released).
    - cron: "39 3,11,19 * * *" # same in UTC and UTC+8
    # Weekly flake input bump (Monday ~04:39 UTC). Triggers a full rebuild.
    - cron: "39 4 * * 1"

permissions:
  contents: write

# Avoid scheduled runs racing each other on the git push in `update`.
concurrency:
  group: build-and-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: aur3l14no
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump flake inputs
        # Only on the weekly cron or an explicit manual dispatch. Daily
        # crons and push events skip this step so the cache survives.
        if: >-
          github.event_name == 'workflow_dispatch'
          || (github.event_name == 'schedule' && github.event.schedule == '39 4 * * 1')
        run: |
          nix flake update
          git add -u
          git diff --cached --quiet || git commit -m "Bump inputs"

      - name: Update sing-box versions
        run: nix develop -c scripts/update_singbox.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: git push || true

  build:
    needs: update
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master

      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: aur3l14no
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build all packages for ${{ matrix.system }}
        run: |
          set -euo pipefail
          nix flake show --json 2>/dev/null \
            | jq -r '.packages."${{ matrix.system }}" | keys[]' \
            | while IFS= read -r attr; do
                echo "::group::Build $attr"
                nix build --no-link ".#packages.${{ matrix.system }}.\"$attr\""
                echo "::endgroup::"
              done
